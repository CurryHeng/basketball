<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>球星图片搜索下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #FF6B00;
            --bg-dark: #0D0D0D;
            --bg-card: #1A1A1A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --border: #333333;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        
        .search-box {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 0.875rem 1rem;
            border: 2px solid var(--border);
            border-radius: 50px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 1rem;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        button {
            padding: 0.875rem 2rem;
            background: var(--primary);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #E55A00;
        }
        
        button:disabled {
            background: var(--border);
            cursor: not-allowed;
        }
        
        .presets {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 2rem;
        }
        
        .preset-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
        }
        
        .preset-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .status {
            text-align: center;
            padding: 1rem;
            color: var(--text-secondary);
        }
        
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .image-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        
        .image-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }
        
        .image-wrapper {
            position: relative;
            aspect-ratio: 1;
            background: #252525;
        }
        
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .image-loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }
        
        .image-info {
            padding: 1rem;
        }
        
        .image-desc {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .image-source {
            font-size: 0.75rem;
            color: var(--primary);
        }
        
        .download-btn {
            width: 100%;
            margin-top: 0.75rem;
            padding: 0.5rem;
            font-size: 0.875rem;
        }
        
        .download-all {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 0 auto 2rem;
            padding: 1rem;
        }
        
        .download-log {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 2rem;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }
        
        .log-item:last-child {
            border-bottom: none;
        }
        
        .log-success {
            color: #4CAF50;
        }
        
        .log-error {
            color: #f44336;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }
        
        @media (max-width: 600px) {
            .search-box {
                flex-direction: column;
            }
            
            .images-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏀 球星图片搜索下载</h1>
        <p class="subtitle">搜索免费可商用图片，一键下载到本地</p>
        
        <div class="presets">
            <button class="preset-btn" data-query="stephen curry">库里</button>
            <button class="preset-btn" data-query="lebron james">詹姆斯</button>
            <button class="preset-btn" data-query="kevin durant">杜兰特</button>
            <button class="preset-btn" data-query="giannis antetokounmpo">字母哥</button>
            <button class="preset-btn" data-query="luka doncic">东契奇</button>
            <button class="preset-btn" data-query="michael jordan">乔丹</button>
            <button class="preset-btn" data-query="kobe bryant">科比</button>
        </div>
        
        <div class="search-box">
            <input type="text" id="search-input" placeholder="输入球星名称搜索...">
            <button id="search-btn">搜索</button>
        </div>
        
        <div id="status" class="status"></div>
        
        <div id="images-grid" class="images-grid"></div>
        
        <button id="download-all" class="download-all hidden">下载全部图片</button>
        
        <div id="download-log" class="download-log hidden"></div>
    </div>

    <script>
        const UNSPLASH_ACCESS_KEY = ''; // 可选：填入你的Unsplash API Key
        
        const imagesGrid = document.getElementById('images-grid');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const statusEl = document.getElementById('status');
        const downloadAllBtn = document.getElementById('download-all');
        const downloadLog = document.getElementById('download-log');
        
        let currentImages = [];
        
        // 预设按钮
        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                searchInput.value = btn.dataset.query;
                searchImages(btn.dataset.query);
            });
        });
        
        // 搜索按钮
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) searchImages(query);
        });
        
        // 回车搜索
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) searchImages(query);
            }
        });
        
        // 下载全部
        downloadAllBtn.addEventListener('click', downloadAll);
        
        async function searchImages(query) {
            statusEl.textContent = '搜索中...';
            searchBtn.disabled = true;
            imagesGrid.innerHTML = '';
            currentImages = [];
            
            try {
                const images = await searchUnsplash(query, 12);
                currentImages = images;
                
                if (images.length === 0) {
                    statusEl.textContent = '未找到图片';
                    return;
                }
                
                statusEl.textContent = `找到 ${images.length} 张图片`;
                renderImages(images);
                downloadAllBtn.classList.remove('hidden');
                
            } catch (error) {
                statusEl.textContent = '搜索失败: ' + error.message;
            } finally {
                searchBtn.disabled = false;
            }
        }
        
        async function searchUnsplash(query, count = 10) {
            // 使用Unsplash Source API（无需API Key）
            const images = [];
            
            for (let i = 0; i < count; i++) {
                const timestamp = Date.now() + i;
                images.push({
                    id: `unsplash_${i}_${timestamp}`,
                    url: `https://source.unsplash.com/400x400/?${encodeURIComponent(query)},basketball,sports&sig=${timestamp}`,
                    downloadUrl: `https://source.unsplash.com/600x600/?${encodeURIComponent(query)},basketball,sports&sig=${timestamp}`,
                    description: `${query} - 图片 ${i + 1}`,
                    source: 'Unsplash',
                    author: 'Unsplash'
                });
            }
            
            return images;
        }
        
        function renderImages(images) {
            imagesGrid.innerHTML = images.map((img, index) => `
                <div class="image-card" data-index="${index}">
                    <div class="image-wrapper">
                        <div class="image-loading">加载中...</div>
                        <img src="${img.url}" alt="${img.description}" 
                             onload="this.previousElementSibling.style.display='none'"
                             onerror="this.previousElementSibling.textContent='加载失败'">
                    </div>
                    <div class="image-info">
                        <div class="image-desc">${img.description}</div>
                        <div class="image-source">来源: ${img.source}</div>
                        <button class="download-btn" data-index="${index}">下载此图</button>
                    </div>
                </div>
            `).join('');
            
            // 绑定下载按钮
            document.querySelectorAll('.download-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = parseInt(btn.dataset.index);
                    downloadSingle(currentImages[index]);
                });
            });
        }
        
        async function downloadSingle(image) {
            addLog(`📥 开始下载: ${image.description}`, '');
            
            try {
                // 由于浏览器安全限制，直接下载跨域图片需要特殊处理
                // 使用 fetch + blob 方式
                const response = await fetch(image.downloadUrl);
                const blob = await response.blob();
                
                // 创建下载链接
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${image.id}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                addLog(`✅ 下载成功: ${image.id}.jpg`, 'success');
                
            } catch (error) {
                // 备用方案：直接打开图片
                addLog(`⚠️ 自动下载失败，请右键图片另存为`, 'error');
                window.open(image.downloadUrl, '_blank');
            }
        }
        
        async function downloadAll() {
            downloadLog.classList.remove('hidden');
            addLog(`📥 开始批量下载 ${currentImages.length} 张图片...`, '');
            
            for (let i = 0; i < currentImages.length; i++) {
                await downloadSingle(currentImages[i]);
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            addLog(`🎉 批量下载完成！`, 'success');
        }
        
        function addLog(message, type) {
            const item = document.createElement('div');
            item.className = `log-item ${type ? 'log-' + type : ''}`;
            item.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            downloadLog.appendChild(item);
            downloadLog.scrollTop = downloadLog.scrollHeight;
            downloadLog.classList.remove('hidden');
        }
    </script>
</body>
</html>
